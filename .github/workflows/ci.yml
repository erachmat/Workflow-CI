name: MLflow CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          python-version: "3.12"
          
      - name: Install MLflow
        shell: bash -l {0}
        run: pip install mlflow==2.19.0

      # BASIC TIER: Run MLflow Project
      - name: Train Model (MLflow Project)
        shell: bash -l {0}
        run: |
          mlflow run MLProject/

      # SKILLED TIER (Variant A): Commit artifact back to GitHub
      - name: Commit Model Artifact to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add MLProject/saved_model/
          git commit -m "Automated model artifact update [skip ci]" --allow-empty
          git push

      # ADVANCE TIER: Containerize and push to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image via MLflow
        shell: bash -l {0}
        run: |
          mlflow models build-docker -m MLProject/saved_model -n ${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-model:latest

      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-model:latest
