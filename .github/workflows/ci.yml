name: MLflow CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          python-version: "3.10"

      - name: Install MLflow
        shell: bash -l {0}
        run: pip install mlflow==2.19.0

      - name: Train Model (MLflow Project)
        shell: bash -l {0}
        run: |
          mlflow run MLProject/

      - name: Commit Model Artifact to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add MLProject/saved_model/
          git commit -m "Automated model artifact update [skip ci]" --allow-empty
          git push

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build from our OWN Dockerfile instead of `mlflow models build-docker`.
        # That command generates its own internal Dockerfile which we cannot edit, and
        # every built-in env-manager choice (uv, conda, virtualenv) hits a hard blocker
        # inside that auto-generated template (an open MLflow bug, an Anaconda ToS gate,
        # and a broken get-pip.py bootstrap, respectively). Writing our own Dockerfile
        # that just pip-installs the model's own requirements.txt avoids all three.
      - name: Build Docker Image (custom Dockerfile)
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-model:latest -f MLProject/Dockerfile MLProject/

      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-model:latest
